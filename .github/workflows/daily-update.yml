name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '25 18 * * *'   # runs daily at 18:25 UTC
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 23f2002096@ds.study.iitm.ac.in daily update step
        run: |
          echo "Last update: $(date)" >> daily-log.txt
          
          git config user.name "github-actions"
          git config user.email "23f2002096@ds.study.iitm.ac.in"
          
          git add daily-log.txt
          git commit -m "Automated daily update $(date)" || echo "No changes to commit"
          git push
