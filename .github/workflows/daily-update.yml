name: Daily Repository Update

on:
  schedule:
    # Runs daily at 09:30 UTC (specific hour & minute, no wildcards)
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Daily commit by 23f2002096@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" > daily-status.txt
          git config user.name "DevSync Bot"
          git config user.email "23f2002096@ds.study.iitm.ac.in"
          git add daily-status.txt
          git commit -m "Automated daily update: $(date -u)" || echo "No changes to commit"
          git push